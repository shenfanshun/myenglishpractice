<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily English News 每日英語練習</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'PingFang TC', sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }

.screen { display: none; position: fixed; inset: 0; background: #f5f7fa; z-index: 100; align-items: center; justify-content: center; }
.screen.active { display: flex; }
.login-box { background: #fff; border-radius: 16px; padding: 36px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 380px; text-align: center; }
.login-logo { font-size: 40px; margin-bottom: 12px; }
.login-title { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
.login-box label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
.login-box input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 14px; margin-bottom: 14px; outline: none; transition: border 0.2s; }
.login-box input:focus { border-color: #3b82f6; }
.login-btn { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
.login-btn:hover { background: #2563eb; }
.login-err { color: #dc2626; font-size: 13px; margin-top: 8px; min-height: 20px; }
.login-hint { font-size: 12px; color: #94a3b8; margin-top: 16px; line-height: 1.6; }
.login-hint a { color: #3b82f6; }
.setup-step { margin-bottom: 16px; }
.step-badge { display: inline-block; background: #eff6ff; color: #3b82f6; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }

#app { display: none; }
header { background: #fff; border-bottom: 2px solid #e8edf2; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; }
.logo-text h1 { font-size: 16px; font-weight: 700; color: #1e293b; }
.logo-text p { font-size: 11px; color: #94a3b8; }
.header-right { display: flex; align-items: center; gap: 10px; }
.date-badge { background: #eff6ff; color: #3b82f6; padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.logout-btn { background: none; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 5px 12px; font-size: 12px; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
.logout-btn:hover { border-color: #dc2626; color: #dc2626; }

.main { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
.topic-bar { background: #fff; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.section-label { font-size: 12px; color: #64748b; margin-bottom: 8px; font-weight: 700; letter-spacing: 0.5px; }

.level-selector { display: flex; gap: 10px; margin-bottom: 16px; }
.level-btn { flex: 1; padding: 11px 10px; border-radius: 10px; border: 2px solid #e2e8f0; background: #fff; cursor: pointer; transition: all 0.2s; text-align: center; }
.level-btn .lv-emoji { font-size: 19px; margin-bottom: 3px; }
.level-btn .lv-name { font-size: 13px; font-weight: 700; color: #1e293b; }
.level-btn .lv-tag { font-size: 11px; color: #94a3b8; }
.level-btn.active-beginner { border-color: #10b981; background: #ecfdf5; }
.level-btn.active-beginner .lv-name { color: #059669; }
.level-btn.active-intermediate { border-color: #8b5cf6; background: #ede9fe; }
.level-btn.active-intermediate .lv-name { color: #7c3aed; }

.topics { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.topic-btn { padding: 7px 15px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: #fff; color: #475569; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.topic-btn:hover { border-color: #3b82f6; color: #3b82f6; }
.topic-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

.generate-btn { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.generate-btn:hover { background: #2563eb; }
.generate-btn:disabled { background: #93c5fd; cursor: not-allowed; }

.card { background: #fff; border-radius: 12px; padding: 22px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 14px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 8px; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
.badge-blue { background: #dbeafe; color: #1d4ed8; }
.badge-green { background: #dcfce7; color: #15803d; }
.badge-purple { background: #ede9fe; color: #6d28d9; }
.badge-emerald { background: #d1fae5; color: #059669; }
.badge-violet { background: #ede9fe; color: #7c3aed; }

.article-en { font-size: 15px; line-height: 1.95; color: #1e293b; }
.article-zh { font-size: 13px; line-height: 1.8; color: #64748b; margin-top: 14px; padding-top: 14px; border-top: 1px dashed #e2e8f0; }
.zh-label { font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; letter-spacing: 1px; }

.vocab-word { background: #fef9c3; border-bottom: 2px solid #fbbf24; cursor: pointer; border-radius: 2px; padding: 0 1px; transition: background 0.15s; }
.vocab-word:hover { background: #fde68a; }

.tooltip { position: fixed; z-index: 999; background: #1e293b; color: #fff; padding: 10px 14px; border-radius: 10px; font-size: 13px; max-width: 260px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); pointer-events: none; display: none; line-height: 1.6; }
.tooltip .t-word { font-size: 15px; font-weight: 700; color: #fbbf24; }
.tooltip .t-pos { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.tooltip .t-zh { color: #e2e8f0; }

.tts-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.tts-btn { padding: 8px 14px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; color: #475569; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
.tts-btn:hover { border-color: #3b82f6; color: #3b82f6; }
.tts-btn.playing { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
.speed-select { padding: 7px 10px; border-radius: 8px; border: 1.5px solid #e2e8f0; font-size: 13px; color: #475569; background: #fff; cursor: pointer; }
.tts-tip { font-size: 12px; color: #94a3b8; margin-top: 10px; }

.vocab-card { padding: 12px; background: #f8fafc; border-radius: 8px; border-left: 3px solid #3b82f6; }
.vocab-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.vocab-word-text { font-size: 15px; font-weight: 700; color: #1e293b; }
.vocab-pos-tag { font-size: 11px; color: #94a3b8; background: #e2e8f0; padding: 2px 7px; border-radius: 10px; }
.vocab-zh-text { font-size: 14px; color: #3b82f6; font-weight: 600; }
.vocab-audio-btn { margin-left: auto; background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 7px; padding: 4px 9px; font-size: 12px; color: #3b82f6; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; transition: all 0.2s; white-space: nowrap; }
.vocab-audio-btn:hover { background: #dbeafe; }
.vocab-example { font-size: 12px; color: #64748b; font-style: italic; }

.quiz-q { font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 10px; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
.quiz-opt { padding: 10px 14px; border-radius: 8px; border: 1.5px solid #e2e8f0; font-size: 13px; color: #475569; cursor: pointer; transition: all 0.2s; text-align: left; }
.quiz-opt:hover:not(:disabled) { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
.quiz-opt.correct { background: #dcfce7; border-color: #16a34a; color: #15803d; }
.quiz-opt.wrong { background: #fee2e2; border-color: #dc2626; color: #dc2626; }
.quiz-opt:disabled { cursor: default; }
.quiz-result { font-size: 13px; font-weight: 600; }
.quiz-result.pass { color: #15803d; }
.quiz-result.fail { color: #dc2626; }
.quiz-divider { border: none; border-top: 1px solid #f1f5f9; margin: 14px 0; }

.placeholder { text-align: center; padding: 60px 20px; color: #94a3b8; }
.placeholder .ph-icon { font-size: 48px; margin-bottom: 12px; }
.spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.section-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: #3b82f6; color: #fff; border-radius: 50%; font-size: 12px; font-weight: 700; }
@media(max-width:600px) { .card { padding: 14px; } .login-box { padding: 28px 20px; } }
</style>
</head>
<body>

<!-- Login -->
<div class="screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📰</div>
    <div class="login-title">Daily English News</div>
    <div class="login-sub">每日英語新聞練習 · 請輸入密碼</div>
    <label>密碼 Password</label>
    <input type="password" id="loginPwd" placeholder="輸入你的密碼" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">登入 Login</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">📰</div>
      <div class="logo-text"><h1>Daily English News</h1><p>每日英語新聞練習</p></div>
    </div>
    <div class="header-right">
      <div class="date-badge" id="dateBadge"></div>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </header>

  <div class="main">
    <div class="topic-bar">
      <div class="section-label">選擇程度 CHOOSE LEVEL</div>
      <div class="level-selector">
        <button class="level-btn active-beginner" id="lvBeginner" onclick="selectLevel('beginner')">
          <div class="lv-emoji">🌱</div><div class="lv-name">初階 Beginner</div><div class="lv-tag">A1 – A2</div>
        </button>
        <button class="level-btn" id="lvIntermediate" onclick="selectLevel('intermediate')">
          <div class="lv-emoji">🚀</div><div class="lv-name">中階 Intermediate</div><div class="lv-tag">B1 – B2</div>
        </button>
      </div>
      <div class="section-label">選擇主題 CHOOSE TOPIC</div>
      <div class="topics">
        <button class="topic-btn active" data-topic="Technology">💻 科技</button>
        <button class="topic-btn" data-topic="Environment">🌿 環境</button>
        <button class="topic-btn" data-topic="Health">🏥 健康</button>
        <button class="topic-btn" data-topic="Travel">✈️ 旅遊</button>
        <button class="topic-btn" data-topic="Culture">🎭 文化</button>
        <button class="topic-btn" data-topic="Science">🔬 科學</button>
        <button class="topic-btn" data-topic="Business">💼 商業</button>
      </div>
      <button class="generate-btn" id="generateBtn" onclick="generateArticle()">
        <span id="btnText">✨ 產生今日短文 Generate Today's Article</span>
      </button>
    </div>
    <div id="content">
      <div class="placeholder"><div class="ph-icon">📖</div><p>選擇程度與主題，點擊上方按鈕開始今日練習！<br>Choose your level and topic, then click the button!</p></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="t-word" id="tWord"></div>
  <div class="t-pos" id="tPos"></div>
  <div class="t-zh" id="tZh"></div>
</div>

<script>
const K_PWD = 'den_pwd', K_AUTH = 'den_auth';
const HARD_PASSWORD = 'GA8719eng';

// 自動儲存硬編碼密碼
localStorage.setItem(K_PWD, HARD_PASSWORD);

(function init() {
  const isAuthed = sessionStorage.getItem(K_AUTH) === '1';
  if (isAuthed) showApp();
  else show('loginScreen');
})();

function show(id) {
  const login = document.getElementById('loginScreen');
  if (login) login.classList.toggle('active', id === 'loginScreen');
}
function showApp() {
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('app').style.display = 'block';
  document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}


function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  const err = document.getElementById('loginErr');
  if (pwd === HARD_PASSWORD) {
    sessionStorage.setItem(K_AUTH, '1');
    document.getElementById('loginScreen').classList.remove('active');
    showApp();
  } else {
    err.textContent = '密碼錯誤，請再試一次';
    document.getElementById('loginPwd').value = '';
  }
}
function doLogout() {
  sessionStorage.removeItem(K_AUTH);
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPwd').value = '';
  document.getElementById('loginErr').textContent = '';
  show('loginScreen');
}

let currentLevel = 'beginner';
function selectLevel(lv) {
  currentLevel = lv;
  document.getElementById('lvBeginner').className = 'level-btn' + (lv==='beginner'?' active-beginner':'');
  document.getElementById('lvIntermediate').className = 'level-btn' + (lv==='intermediate'?' active-intermediate':'');
}
document.querySelectorAll('.topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

let currentArticle = null;
let quizAnswered = [false,false,false];
let quizScore = 0;
let isSpeakingFull = false;

async function generateArticle() {
  const topic = document.querySelector('.topic-btn.active').dataset.topic;

  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> 生成中 Generating...';
  stopAll();

  const isInter = currentLevel === 'intermediate';
  const vocabCount = isInter ? 8 : 6;
  const sentCount = '6-7';
  const levelDesc = isInter
    ? 'intermediate (CEFR B1-B2): varied vocabulary, mixed tenses'
    : 'beginner (CEFR A1-A2): simple words, present tense';

  // 分開建構 vocab 範例，避免 template literal 過長
  let vocabSample = '';
  for (let i = 1; i <= vocabCount; i++) {
    vocabSample += `{"word":"w${i}","pos":"pos","zh":"意思","example":"Ex."}`;
    if (i < vocabCount) vocabSample += ',';
  }

  const prompt = `Create a short news article for ${levelDesc} English learners. Topic: ${topic}. Write ${sentCount} sentences. Pick ${vocabCount} key vocabulary words from the article.

Reply ONLY with this JSON (no markdown, no extra text):
{"headline":"...","level":"${isInter?'B1-B2':'A1-A2'}","level_zh":"${isInter?'中階':'初階'}","sentences":["S1","S2","S3","S4","S5","S6"],"article_zh":"中文翻譯","vocab":[${vocabSample}],"quiz":[{"q":"Q1?","options":["A.","B.","C.","D."],"answer":0},{"q":"Q2?","options":["A.","B.","C.","D."],"answer":1},{"q":"Q3?","options":["A.","B.","C.","D."],"answer":0}]}

Rules: each vocab word must appear exactly in sentences. Keep example sentences under 10 words. Keep Chinese translations under 6 characters.`;

  try {
    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 3000 }
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    let raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
    // 找到第一個 { 和最後一個 } 確保完整 JSON
    const start = raw.indexOf('{');
    const end = raw.lastIndexOf('}');
    if (start !== -1 && end !== -1) raw = raw.substring(start, end + 1);
    currentArticle = JSON.parse(raw);
    quizAnswered = [false,false,false];
    quizScore = 0;
    renderAll();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="placeholder"><div class="ph-icon">⚠️</div><p>發生錯誤：${e.message}<br>請確認 API Key 是否正確。</p></div>`;
  }
  btn.disabled = false;
  btnText.innerHTML = '🔄 重新產生 Regenerate';
}

function renderAll() {
  const a = currentArticle;
  const articleText = a.sentences.join(' ');

  function highlightVocab(text) {
    let r = text;
    a.vocab.forEach(v => {
      const esc = v.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      r = r.replace(new RegExp(`\\b(${esc})\\b`,'gi'), m =>
        `<span class="vocab-word" data-word="${v.word.toLowerCase()}">${m}</span>`);
    });
    return r;
  }

  const vocabCards = a.vocab.map(v => `
    <div class="vocab-card">
      <div class="vocab-top">
        <span class="vocab-word-text">${v.word}</span>
        <span class="vocab-pos-tag">${v.pos}</span>
        <span class="vocab-zh-text">${v.zh}</span>
        <button class="vocab-audio-btn" onclick="speakWord('${v.word.replace(/'/g,"\\'")}')">🔊 發音</button>
      </div>
      <div class="vocab-example">e.g. ${v.example}
        <button class="vocab-audio-btn" style="margin-left:6px;" onclick="speakWord('${v.example.replace(/'/g,"\\'")}')">🔊 例句</button>
      </div>
    </div>`).join('');

  const quizHtml = a.quiz.map((q,qi) => `
    <div id="quiz-${qi}">
      <div class="quiz-q">${qi+1}. ${q.q}</div>
      <div class="quiz-options">
        ${q.options.map((opt,oi) => `<button class="quiz-opt" onclick="answerQuiz(${qi},${oi},${q.answer})">${opt}</button>`).join('')}
      </div>
      <div class="quiz-result" id="qr-${qi}"></div>
    </div>
    ${qi<2?'<hr class="quiz-divider">':''}`).join('');

  const lvBadge = a.level_zh==='初階'
    ? `<span class="badge badge-emerald">🌱 初階 ${a.level}</span>`
    : `<span class="badge badge-violet">🚀 中階 ${a.level}</span>`;

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="section-num">1</span> 閱讀 Reading</div>
        ${lvBadge}
      </div>
      <div style="font-size:17px;font-weight:700;color:#1e293b;margin-bottom:14px;line-height:1.4;">${a.headline}</div>
      <div class="article-en">${highlightVocab(articleText)}</div>
      <div class="article-zh"><div class="zh-label">中文翻譯 TRANSLATION</div>${a.article_zh}</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="section-num">2</span> 口說練習 Speaking</div>
        <span class="badge badge-green">TTS</span>
      </div>
      <div class="tts-bar">
        <button class="tts-btn" id="playAllBtn" onclick="toggleFullSpeech()">▶️ 朗讀全文</button>
        <button class="tts-btn" onclick="stopAll()">⏹ 停止</button>
        <select class="speed-select" id="speedSelect">
          <option value="0.7">慢速 0.7x</option>
          <option value="1" selected>正常 1x</option>
          <option value="1.3">快速 1.3x</option>
        </select>
      </div>
      <div class="tts-tip">💡 點擊「朗讀全文」跟著一起唸，加強口說記憶！</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="section-num">3</span> 單字 Vocabulary</div>
        <span class="badge badge-purple">${a.vocab.length} words</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">${vocabCards}</div>
      <div class="tts-tip" style="margin-top:12px;">💡 文章中<span style="background:#fef9c3;border-bottom:2px solid #fbbf24;padding:0 4px;">黃色底線</span>單字可點擊查看解釋，單字卡可個別朗讀！</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="section-num">4</span> 測驗 Quiz</div>
        <span class="badge badge-blue" id="scoreDisplay">0 / 3</span>
      </div>
      ${quizHtml}
    </div>`;

  document.querySelectorAll('.vocab-word').forEach(el => {
    el.addEventListener('mouseenter', showTooltip);
    el.addEventListener('mouseleave', hideTooltip);
  });
}

// TTS
function speakWord(text) {
  stopAll();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = parseFloat(document.getElementById('speedSelect')?.value || 1);
  speechSynthesis.speak(u);
}

function toggleFullSpeech() {
  if (isSpeakingFull) { stopAll(); return; }
  if (!currentArticle) return;
  isSpeakingFull = true;
  const btn = document.getElementById('playAllBtn');
  if (btn) { btn.classList.add('playing'); btn.textContent = '⏸ 暫停'; }
  const text = currentArticle.sentences.join(' ');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = parseFloat(document.getElementById('speedSelect')?.value || 1);
  u.onend = () => stopAll();
  speechSynthesis.speak(u);
}

function stopAll() {
  speechSynthesis.cancel();
  isSpeakingFull = false;
  const btn = document.getElementById('playAllBtn');
  if (btn) { btn.classList.remove('playing'); btn.textContent = '▶️ 朗讀全文'; }
}

function showTooltip(e) {
  const v = currentArticle?.vocab.find(v => v.word.toLowerCase() === e.target.dataset.word);
  if (!v) return;
  const tt = document.getElementById('tooltip');
  document.getElementById('tWord').textContent = v.word;
  document.getElementById('tPos').textContent = v.pos;
  document.getElementById('tZh').textContent = `${v.zh}　e.g. ${v.example}`;
  tt.style.display = 'block';
  const r = e.target.getBoundingClientRect();
  tt.style.left = Math.min(r.left, window.innerWidth-270)+'px';
  tt.style.top = (r.bottom+8)+'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function answerQuiz(qi, chosen, correct) {
  if (quizAnswered[qi]) return;
  quizAnswered[qi] = true;
  document.getElementById(`quiz-${qi}`).querySelectorAll('.quiz-opt').forEach((opt,i) => {
    opt.disabled = true;
    if (i===correct) opt.classList.add('correct');
    else if (i===chosen) opt.classList.add('wrong');
  });
  const r = document.getElementById(`qr-${qi}`);
  if (chosen===correct) {
    quizScore++;
    r.textContent = '✅ 正確！Correct!';
    r.className = 'quiz-result pass';
  } else {
    r.textContent = `❌ 答錯了。正確答案是：${currentArticle.quiz[qi].options[correct]}`;
    r.className = 'quiz-result fail';
  }
  document.getElementById('scoreDisplay').textContent = `${quizScore} / 3`;
}
</script>
